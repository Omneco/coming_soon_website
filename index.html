<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Ethereal Ecology - Coming Soon</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#13ec54",
            "background-light": "#f6f8f6",
            "background-dark": "#102216",
          },
          fontFamily: {
            "display": ["Inter"]
          },
          borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
          animation: {
            'fade-in': 'fadeIn 3s ease-out forwards',
            'orb-1': 'floatOrb1 20s infinite ease-in-out alternate',
            'orb-2': 'floatOrb2 25s infinite ease-in-out alternate',
            'orb-3': 'floatOrb3 30s infinite ease-in-out alternate',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            floatOrb1: {
              '0%': { transform: 'translate(0, 0) scale(1)', opacity: '0.4' },
              '100%': { transform: 'translate(10%, 15%) scale(1.1)', opacity: '0.6' },
            },
            floatOrb2: {
              '0%': { transform: 'translate(0, 0) scale(1)', opacity: '0.3' },
              '100%': { transform: 'translate(-15%, -10%) scale(1.2)', opacity: '0.5' },
            },
            floatOrb3: {
              '0%': { transform: 'translate(0, 0) scale(1)', opacity: '0.2' },
              '100%': { transform: 'translate(5%, -20%) scale(1.15)', opacity: '0.4' },
            }
          }
        },
      },
    }
  </script>
  <style>
    body {
      overflow: hidden;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background-color: #0A110E;
    }

    .title-text {
      font-size: clamp(32px, 8vw, 120px);
      line-height: 1.1;
    }

    .sub-text {
      font-size: clamp(16px, 2vw, 18px);
      line-height: 1.6;
    }

    .glass-panel {
      background: rgba(20, 32, 26, 0.35);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(212, 229, 217, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }

    /* Success state for the form */
    .success-message {
      display: none;
      animation: fadeIn 0.5s ease-out forwards;
    }

    .success-message.visible {
      display: flex;
    }
  </style>
</head>
<body class="bg-[#0A110E] text-[#F2F7F4] h-screen w-screen relative flex items-center justify-center animate-fade-in">

  <!-- Dynamic Background Mesh -->
  <div class="absolute inset-0 overflow-hidden w-full h-full z-0">
    <div class="orb bg-primary/30 w-[clamp(400px,60vw,800px)] h-[clamp(400px,60vw,800px)] top-[-10%] left-[-10%] animate-orb-1 mix-blend-screen"></div>
    <div class="orb bg-[#8AB99B]/30 w-[clamp(300px,50vw,700px)] h-[clamp(300px,50vw,700px)] bottom-[-20%] right-[-10%] animate-orb-2 mix-blend-screen"></div>
    <div class="orb bg-primary/20 w-[clamp(200px,40vw,600px)] h-[clamp(200px,40vw,600px)] top-[40%] left-[30%] animate-orb-3 mix-blend-screen"></div>
  </div>

  <!-- Content Container -->
  <div class="relative z-10 w-full px-6 flex justify-center items-center h-full">
    <div class="glass-panel rounded-lg p-[clamp(32px,6vw,64px)] max-w-[800px] flex flex-col items-center text-center space-y-6">

      <h1 class="title-text font-black tracking-[-0.033em] text-[#F2F7F4]">
        Rooting and reaching.
      </h1>

      <p class="sub-text font-light text-[#738B7E] max-w-[600px]">
        Great things take time to grow. We are currently finalizing our product to ensure it's perfectly aligned with our vision before our big reveal. Join our waitlist to be the first to know.
      </p>

      <!-- Signup Form -->
      <form id="waitlist-form" class="mt-8 flex flex-col sm:flex-row gap-3 w-full max-w-[500px]" novalidate>
        <div class="relative flex-grow">
          <input
            id="email-input"
            class="w-full bg-[#0A110E]/40 border border-[#738B7E]/30 rounded-lg px-5 py-4 text-[#F2F7F4] placeholder-[#738B7E]/60 focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/30 transition-all duration-300 backdrop-blur-sm"
            placeholder="Enter your email address"
            required
            type="email"
            aria-label="Email address"
          >
          <p id="email-error" class="absolute -bottom-5 left-1 text-xs text-red-400 hidden" role="alert"></p>
        </div>
        <button
          id="submit-btn"
          class="bg-primary text-[#0A110E] font-bold px-8 py-4 rounded-lg hover:bg-[#11d64c] hover:shadow-[0_0_20px_rgba(19,236,84,0.3)] transition-all duration-300 whitespace-nowrap active:scale-[0.98] disabled:opacity-60 disabled:cursor-not-allowed"
          type="submit"
        >
          Notify Me
        </button>
      </form>

      <!-- Success Message (hidden until form is submitted) -->
      <div id="success-message" class="success-message flex-col items-center gap-2 text-center" role="status" aria-live="polite">
        <span class="material-symbols-outlined text-primary text-4xl" aria-hidden="true">check_circle</span>
        <p class="sub-text font-medium text-[#F2F7F4]">You're on the list!</p>
        <p class="text-sm text-[#738B7E]">We'll reach out as soon as we launch.</p>
      </div>

    </div>
  </div>

  <script>
    (function () {
      var form = document.getElementById('waitlist-form');
      var emailInput = document.getElementById('email-input');
      var emailError = document.getElementById('email-error');
      var submitBtn = document.getElementById('submit-btn');
      var successMessage = document.getElementById('success-message');

      function showError(message) {
        emailError.textContent = message;
        emailError.classList.remove('hidden');
        emailInput.classList.add('border-red-400/60', 'focus:border-red-400/60', 'focus:ring-red-400/20');
        emailInput.classList.remove('focus:border-primary/50', 'focus:ring-primary/30');
      }

      function clearError() {
        emailError.classList.add('hidden');
        emailError.textContent = '';
        emailInput.classList.remove('border-red-400/60', 'focus:border-red-400/60', 'focus:ring-red-400/20');
        emailInput.classList.add('focus:border-primary/50', 'focus:ring-primary/30');
      }

      emailInput.addEventListener('input', function () {
        if (emailError.textContent) {
          clearError();
        }
      });

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        clearError();

        var email = emailInput.value.trim();

        if (!email) {
          showError('Please enter your email address.');
          emailInput.focus();
          return;
        }

        // Use the browser's native email validity check (RFC 5321-compliant)
        if (!emailInput.validity.valid) {
          showError('Please enter a valid email address.');
          emailInput.focus();
          return;
        }

        // Disable the form while "submitting"
        submitBtn.disabled = true;
        submitBtn.textContent = 'Joining…';

        // TODO: Replace this timeout with a real API call, e.g.:
        // fetch('/api/waitlist', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        //   body: JSON.stringify({ email: email }) })
        //   .then(function(res) { if (!res.ok) throw new Error('Request failed'); })
        //   .then(function() { form.style.display = 'none'; successMessage.classList.add('visible'); })
        //   .catch(function() { showError('Something went wrong. Please try again.'); submitBtn.disabled = false; submitBtn.textContent = 'Notify Me'; });
        setTimeout(function () {
          form.style.display = 'none';
          successMessage.classList.add('visible');
        }, 800);
      });
    })();
  </script>

</body>
</html>
